providers = ["php"]

[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.gd",
  "php82Extensions.mysqli",
  "php82Extensions.pdo_mysql",
  "php82Extensions.mbstring",
  "php82Extensions.zip",
  "composer"
]

[phases.install]
cmds = [
  "composer install --ignore-platform-req=ext-gd --no-dev"
]

[start]
cmd = "php -S 0.0.0.0:$PORT"